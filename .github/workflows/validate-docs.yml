name: Validate Docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: python3 -m pip install --user PyYAML jsonschema
      - name: Validate docs and JSON schemas
        run: python3 scripts/check_docs.py

  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package and test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
          python3 -m pip install pytest ruff mypy PyYAML jsonschema
      - name: Ruff
        run: python3 -m ruff check src tests scripts examples
      - name: Mypy
        run: |
          set -o pipefail
          python3 -m mypy src --show-error-codes --pretty 2>&1 | tee mypy.log
      - name: Upload mypy log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-log
          path: mypy.log
      - name: Pytest
        run: python3 -m pytest
      - name: Demo smoke test
        run: PYTHONPATH=src python3 examples/v0_1/demo.py

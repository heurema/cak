        pattern: "diagnosis object and execution-anchored revision"
        what_to_copy: "Make defects, repair principles, verifier results, and retained candidates explicit."
        what_not_to_copy: "Do not let revision overwrite previous skill evidence silently."
        agent_native_adaptation: "Preserve diagnosis, trace, and verifier records as Evidence IR."
        risk: "Trace-conditioned repair can regress behavior outside the sampled case."
    notes: "Inspected arXiv metadata/abstract."


  - id: src_skillrevise_arxiv
    title: "SkillRevise: Improving LLM-Authored Agent Skills via Trace-Conditioned Skill Revision"
    url: "https://arxiv.org/abs/2606.01139"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Diagnosis, repair, and verifier-passing revision anchor."
    reliability: medium
    claims:
      - id: claim_skillrevise_001
        claim: >-
          SkillRevise defines agent skills as procedural artifacts that help
          agents execute workflows, verify constraints, and recover from
          failures.
        supporting_passage: >-
          "Agent skills are procedural artifacts that enable LLM agents to
          execute workflows, verify constraints, and recover from failures."
        location: "arXiv API abstract for 2606.01139v3"
        confidence: medium
        limitations: "Definition is from one paper and should not be adopted as CAK's final definition."
      - id: claim_skillrevise_002
        claim: >-
          SkillRevise diagnoses skill defects from execution evidence, retrieves
          repair principles, applies execution-anchored edits, re-executes
          candidates, and retains the first verifier-passing skill within a
          revision budget.
        supporting_passage: >-
          "SkillRevise diagnoses skill defects from execution evidence,
          retrieves relevant repair principles from a general memory, and
          applies execution-anchored edits. By re-executing candidates, it
          retains the first verifier-passing skill within the revision budget

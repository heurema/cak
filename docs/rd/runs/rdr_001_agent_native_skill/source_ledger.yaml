  - id: src_skillreducer_arxiv
    title: "SkillReducer: Optimizing LLM Agent Skills for Token Efficiency"
    url: "https://arxiv.org/abs/2603.29919"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Skill package quality, routing, and progressive-disclosure anchor."
    reliability: medium
    claims:
      - id: claim_skillreducer_001
        claim: >-
          SkillReducer reports large-scale skill inefficiencies including
          missing routing descriptions, non-actionable body content, and large
          reference-file token injections.
        supporting_passage: >-
          "We conduct a large-scale empirical study of 55,315 publicly available
          skills and find systemic inefficiencies: 26.4% lack routing
          descriptions entirely, over 60% of body content is non-actionable, and
          reference files can inject tens of thousands of tokens per invocation."
        location: "arXiv API abstract for 2603.29919v1"
        confidence: medium
        limitations: "Token efficiency is not the same as safety or runtime correctness."
      - id: claim_skillreducer_002
        claim: >-
          SkillReducer uses routing optimization and progressive disclosure,
          validated by faithfulness checks and a self-correcting feedback loop.
        supporting_passage: >-
          "Stage 1 optimizes the routing layer... Stage 2 restructures skill
          bodies... separating actionable core rules from supplementary content
          loaded on demand, validated by faithfulness checks and a
          self-correcting feedback loop."
        location: "arXiv API abstract for 2603.29919v1"
        confidence: medium
        limitations: "Does not decide the runtime/control semantics of a skill."
    counterclaims:
      - "Reducing token load can improve attention but cannot replace admission, security, or verifier checks."
    extracted_patterns:
      - pattern_id: pattern_strict_filtering
        pattern: "strict filtering / library pollution prevention"
        what_to_copy: "Remove or quarantine non-actionable, overbroad, or poorly routed skill content."
        what_not_to_copy: "Do not optimize for token count alone."
        agent_native_adaptation: "Treat routing/body quality as admission signals in Evidence IR."
        risk: "Compression can remove needed caveats or safety constraints."
    notes: "Inspected arXiv metadata/abstract."

  - id: src_skillinject_arxiv
    title: "Skill-Inject: Measuring Agent Vulnerability to Skill File Attacks"
    url: "https://arxiv.org/abs/2602.20156"
    type: security
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Agent-skill prompt injection and supply-chain risk anchor."
    reliability: medium
    claims:
      - id: claim_skillinject_001
        claim: >-
          Skill files create a complex agent supply chain and new prompt
          injection surfaces.
        supporting_passage: >-
          "Skills allow users to extend LLM applications with specialized
          third-party code, knowledge, and instructions. Although this can
          extend agent capabilities to new domains, it creates an increasingly
          complex agent supply chain, offering new surfaces for prompt injection
          attacks."

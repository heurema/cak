    notes: "Inspected arXiv metadata/abstract."

  - id: src_agent_skills_spec
    title: "Agent Skills"
    url: "https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview.md"
    type: docs
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Portable package format baseline and official security guidance."
    reliability: high
    claims:
      - id: claim_agent_skills_001
        claim: >-
          Agent Skills are modular packages of instructions, metadata, and
          optional resources that Claude uses automatically when relevant.
        supporting_passage: >-
          "Agent Skills are modular capabilities that extend Claude's
          functionality. Each Skill packages instructions, metadata, and
          optional resources (scripts, templates) that Claude uses automatically
          when relevant."
        location: "Opening paragraph"
        confidence: high
        limitations: "Provider-specific product documentation, not a CAK standard."
      - id: claim_agent_skills_002
        claim: >-
          Agent Skills use progressive disclosure: metadata is always loaded,
          SKILL.md is loaded when triggered, and resources/code are loaded as
          needed.
        supporting_passage: >-
          "Skills can contain three types of content, each loaded at different
          times... Level 1: Metadata (always loaded)... Level 2: Instructions
          (loaded when triggered)... Level 3: Resources and code (loaded as
          needed)."
        location: "How Skills work / Three types of Skill content"
        confidence: high
        limitations: "Loading mechanics do not define runtime-control semantics."
      - id: claim_agent_skills_003
        claim: >-
          The docs warn that malicious Skills can misuse tools, execute code,
          exfiltrate data, or access systems; untrusted Skills should be audited
          like installed software.
        supporting_passage: >-
          "A malicious Skill can direct Claude to invoke tools or execute code
          in ways that don't match the Skill's stated purpose... malicious
          Skills could lead to data exfiltration, unauthorized system access, or
          other security risks... Treat like installing software."
        location: "Security considerations"
        confidence: high
        limitations: "Guidance is not a formal supply-chain or admission model."
      - id: claim_agent_skills_004
        claim: >-
          Runtime constraints differ across product surfaces; the same package
          concept can have different network and execution semantics.
        supporting_passage: >-
          "The exact runtime environment available to your skill depends on the
          product surface... Claude API: No network access... Claude Code: Full
          network access."
        location: "Limitations and constraints"
        confidence: high
        limitations: "Provider-specific surfaces, but useful as a warning against assuming package portability equals runtime portability."
    counterclaims:
      - "A package can distribute instructions/resources but does not by itself prove activation correctness or verifier admission."
    extracted_patterns:
      - pattern_id: pattern_portable_skill_package
        pattern: "portable SKILL.md package"
        what_to_copy: "Separate metadata, instructions, code, and resources."
        what_not_to_copy: "Do not mistake packaging for runtime admission."
        agent_native_adaptation: "Compile package contents into evidence-linked runtime candidates."
        risk: "Package import can smuggle prompt injection or unsafe code."
      - pattern_id: pattern_progressive_disclosure
        pattern: "progressive disclosure"
        what_to_copy: "Load only relevant skill material as needed."
        what_not_to_copy: "Do not rely on retrieval alone for state correctness."
        agent_native_adaptation: "Combine progressive loading with typed activation and verifier checks."
        risk: "Wrong resource loaded in the wrong state."
    notes: "Inspected official Markdown documentation."

  - id: src_vaso_arxiv
    title: "VASO: Formally Verifiable Self-Evolving Skills for Physical AI Agents"
    url: "https://arxiv.org/abs/2606.05395"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Contract/type-system adjacent anchor."
    reliability: medium
    claims:
      - id: claim_vaso_001
        claim: >-
          VASO argues that execution feedback, unit tests, reward, and LLM
          self-critique provide trace-level evidence but not temporal-safety
          guarantees under untested conditions.
        supporting_passage: >-
          "Existing skill-evolution loops refine skills through execution
          feedback, unit tests, environment reward, or LLM self-critique, but
          these signals provide only trace-level evidence: they show that a
          skill worked on sampled executions, not that skill-induced plans
          satisfy temporal safety contracts under untested conditions."
        location: "arXiv API abstract for 2606.05395v1"
        confidence: medium
        limitations: "Physical-agent formal verification may not transfer to all CAK settings."
      - id: claim_vaso_002
        claim: >-
          VASO represents each skill as a semantic contract with formal
          verifier-facing and planner-facing interfaces.
        supporting_passage: >-
          "In VASO, each skill is represented as a semantic contract with two
          coupled interfaces: a formal interface that aligns robot states,
          observations, and control commands with logical propositions for model
          checking, and a planner-facing interface that guides executable
          behavior generation."
        location: "arXiv API abstract for 2606.05395v1"
        confidence: medium
        limitations: "Grounding correctness and proposition coverage are not established for CAK."
      - id: claim_vaso_003
        claim: >-
          VASO uses model-checker filtering and counterexample traces to update
          reusable skill contracts while keeping foundation-model weights frozen.
        supporting_passage: >-
          "A model checker first filters logically inconsistent skill
          contracts... When verification fails, VASO translates the
          counterexample trace into a textual gradient that updates the reusable
          skill contract while keeping foundation-model weights frozen."
        location: "arXiv API abstract for 2606.05395v1"
        confidence: medium
        limitations: "Supports a verifier pattern, not a CAK ContractSpec decision."
    counterclaims:
      - "Formal contracts depend on correct grounding; wrong propositions can make verification misleading."
    extracted_patterns:
      - pattern_id: pattern_semantic_contracts
        pattern: "semantic skill contracts"
        what_to_copy: "Expose verifier-facing obligations explicitly."
        what_not_to_copy: "Do not assume all skills can be fully formalized."
        agent_native_adaptation: "Treat ContractSpec as one verifier facet, not the whole skill."
        risk: "Over-formalization with weak grounding."
      - pattern_id: pattern_counterexample_revision
        pattern: "model-checker filtering and counterexample-driven contract revision"
        what_to_copy: "Use verifier counterexamples as artifact-improvement evidence."
        what_not_to_copy: "Do not auto-promote revisions from one counterexample."
        agent_native_adaptation: "Route revisions through quarantine, replay, and review."
        risk: "Narrow counterexamples can overfit skill changes."
    notes: "Inspected arXiv metadata/abstract."


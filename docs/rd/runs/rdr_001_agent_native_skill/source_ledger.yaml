        claim: >-
          HMT identifies flat memory as a source of workflow mismatch because it
          entangles high-level task logic with site-specific action details.
        supporting_passage: >-
          "We identify that this challenge arises from the flat memory
          structures that entangle high-level task logic with site-specific
          action details. This entanglement induces a workflow mismatch in new
          environments."
        location: "arXiv API abstract for 2603.07024v1"
        confidence: medium
        limitations: "Web-agent setting may not transfer to all CAK tool environments."
      - id: claim_hmt_002
        claim: >-
          HMT separates intent, stage, and action levels, with stage-level

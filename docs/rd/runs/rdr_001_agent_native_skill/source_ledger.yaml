research_run_id: rdr_001_agent_native_skill
status: exploratory
question: "What is an agent-native skill?"
owner: ""
date_started: "2026-06-23"

source_policy:
  claim_support: "Only inspected=true sources with explicit claims may support claim_matrix entries."
  seed_policy: "Seed references and uninspected leads may inform search only; they do not support claims."
  limitation: "Top-6 papers now have targeted full-paper inspection, but this is still not reproducibility or decision-grade implementation validation."

sources:
  - id: src_hasp_arxiv
    title: "Harnessing LLM Agents with Skill Programs"
    url: "https://arxiv.org/abs/2605.17734"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Core active-skill / Program Function anchor."
    reliability: medium
    claims:
      - id: claim_hasp_001
        claim: >-
          HASP frames textual lessons as advisory and introduces executable
          Program Functions that activate on failure-prone states and intervene
          in the agent loop.
        supporting_passage: >-
          "Such lessons are often encoded as textual guidance that remains
          largely advisory, lacking explicit mechanisms for when and how to
          intervene in the agent loop... PFs act as executable guardrails that
          activate on failure-prone states and modify the next action or inject
          corrective context."
        location: "arXiv API abstract for 2605.17734v1"
        confidence: medium
        limitations: "Abstract-level inspection; exact PF API and evaluation details still need full-paper review."
      - id: claim_hasp_002
        claim: >-
          HASP treats Program Functions as modular artifacts usable for
          inference-time intervention, post-training supervision, and controlled
          self-improvement through validated, teacher-reviewed PFs.
        supporting_passage: >-
          "HASP is highly modular: it can be applied at inference time for
          direct agent-loop intervention, during post-training to provide
          structured supervision, or for self-improvement by evolving validated,
          teacher-reviewed PFs."
        location: "arXiv API abstract for 2605.17734v1"
        confidence: medium
        limitations: "Teacher-review cost, validation quality, and false-positive intervention risk are not audited here."
      - id: claim_hasp_003
        claim: >-
          HASP's full paper defines a Program Function as an executable module
          with `should_activate` and `intervene` parts, wrapped by an external
          harness before the next action executes.
        supporting_passage: >-
          "Each skill in HASP is represented as a Program Function (PF), an
          executable module that decides whether to intervene under the current
          state and proposed action, and if so, how to repair the next decision.
          It has two parts: should_activate, which decides whether the skill
          should fire, and intervene, which returns the repair."
        location: "Full paper Section 3.1, Inference-Time Agent Harness with Program Functions"
        confidence: high
        limitations: "Defines HASP's PF abstraction; does not prove CAK should adopt PFs universally."
      - id: claim_hasp_004
        claim: >-
          HASP reports PF-only intervention outperforming prompt-only skills in
          its evaluated web-search, coding, and math settings.
        supporting_passage: >-
          "PF-only already gives large gains over the base multi-loop agent and
          also outperforms Prompt-Only Skills... On web-search reasoning,
          PF-only improves average accuracy to 51.0%, compared with 20.5% for
          Prompt-Only Skills. On coding, PF-only reaches 63.4% average pass@1.
          On mathematical reasoning, PF-only reaches 35.9%, compared with 32.8%
          for Prompt-Only Skills."
        location: "Full paper mechanism/evaluation analysis"
        confidence: medium
        limitations: "Evaluation is HASP-specific; CAK needs activation false-positive and authority-boundary measurements."
      - id: claim_hasp_005
        claim: >-
          HASP explicitly guards skill library admission with executable
          validation and teacher review to reduce library pollution.
        supporting_passage: >-
          "To prevent library pollution, candidates are admitted only after
          executable validation and teacher review: Qexec(c) checks syntax,
          interface validity, mock execution, and legal return types, while
          Qteach(c) evaluates whether the candidate captures a reusable failure
          pattern, fires under appropriate conditions, and proposes a useful
          repair."
        location: "Full paper Section 3, skill evolution/admission"
        confidence: medium
        limitations: "Teacher review is an evaluation component, not a reusable CAK governance design."
    counterclaims:
      - "PFs may overblock or override valid behavior when activation precision is poor."
      - "HASP does not by itself prove that every skill should be an active runtime intervention."
    extracted_patterns:
      - pattern_id: pattern_program_function_intervention
        pattern: "Program Function should_activate / intervene"
        what_to_copy: "Separate activation decision from intervention action."
        what_not_to_copy: "Do not collapse all skills into hard runtime overrides."
        agent_native_adaptation: "Represent active skills as gated runtime-control objects with audit records."
        risk: "False-positive activation can suppress valid agent behavior."
      - pattern_id: pattern_structured_intervention
        pattern: "context injection and action override"
        what_to_copy: "Study both soft corrective context and hard next-action modification."
        what_not_to_copy: "Do not permit intervention without permission, risk, and rollback semantics."
        agent_native_adaptation: "Attach intervention mode to typed effect and verifier policy."
        risk: "Action override can become hidden authority widening."
    notes: "Targeted full-paper inspection added for PF interface, evaluation contrast, and library pollution guards. Full reproducibility not attempted."

  - id: src_awm_arxiv
    title: "Agent Workflow Memory"
    url: "https://arxiv.org/abs/2409.07429"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Core workflow-memory anchor."
    reliability: medium
    claims:
      - id: claim_awm_001
        claim: >-
          AWM induces reusable workflows from past examples or test-time queries
          and selectively provides those workflows to guide future generations.
        supporting_passage: >-
          "We introduce Agent Workflow Memory (AWM), a method for inducing
          commonly reused routines, i.e., workflows, and selectively providing
          workflows to the agent to guide subsequent generations."
        location: "arXiv API abstract for 2409.07429v1"
        confidence: medium
        limitations: "Abstract-level inspection; exact workflow representation and failure cases require full-paper review."
      - id: claim_awm_002
        claim: >-
          AWM reports improved relative success on Mind2Web and WebArena and
          fewer steps on successful WebArena tasks.
        supporting_passage: >-
          "AWM substantially improves the baseline results by 24.6% and 51.1%
          relative success rate on Mind2Web and WebArena while reducing the
          number of steps taken to solve WebArena tasks successfully."
        location: "arXiv API abstract for 2409.07429v1"
        confidence: medium
        limitations: "Benchmark gains do not decide whether workflow memory should be passive, active, or compiled."
      - id: claim_awm_003
        claim: >-
          AWM represents a workflow as a textual description plus a series of
          steps, and induces workflows by abstracting reusable subroutines from
          concrete trajectories.
        supporting_passage: >-
          "Similar to an experience, a workflow comprises two components: first,
          a textual description of the workflow d; and second, a series of steps
          to finish the workflow... we deliberately prompt models to induce
          workflows at finer granularities... we enhance workflow generality by
          abstracting out example-specific contexts."
        location: "Full paper Section 2.2 Workflow Representation and LM-based Workflow Induction"
        confidence: high
        limitations: "Workflow representation remains textual/procedural; runtime state checks are not the core abstraction."
      - id: claim_awm_004
        claim: >-
          AWM reports that workflow guidance can bias agents toward actions not
          relevant to the current environment state, and online induction can
          create incorrect workflows.
        supporting_passage: >-
          "AWM gets slightly lower action F1 scores than MindAct, possibly
          because the augmented workflows may guide the agent to take certain
          actions aligning to the workflows, which are not always relevant to
          the particular environment state at hand... AWMonline induces
          workflows from model-predicted trajectories that are not always
          correct, thus can lead to incorrect workflows that degrade model
          performance."
        location: "Full paper analysis of workflow divergence and online induction"
        confidence: medium
        limitations: "This is a web-navigation failure mode; CAK needs its own trace corpus."
    counterclaims:
      - "AWM alone does not establish typed preconditions, runtime admission, or security semantics."
    extracted_patterns:
      - pattern_id: pattern_workflow_induction
        pattern: "workflow induction from trajectories"
        what_to_copy: "Mine repeated routines from trajectories."
        what_not_to_copy: "Do not assume a linear workflow is valid in every similar task."
        agent_native_adaptation: "Bind workflows to preconditions, postconditions, and repair exits."
        risk: "Wrong-state activation."
    notes: "Targeted full-paper inspection added for workflow representation, abstraction, and failure modes."

  - id: src_voyager_arxiv
    title: "Voyager: An Open-Ended Embodied Agent with Large Language Models"
    url: "https://arxiv.org/abs/2305.16291"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Core executable skill library anchor."
    reliability: medium
    claims:
      - id: claim_voyager_001
        claim: >-
          Voyager stores complex behaviors in an ever-growing skill library of
          executable code and improves programs using environment feedback,
          execution errors, and self-verification.
        supporting_passage: >-
          "Voyager consists of three key components: ... an ever-growing skill
          library of executable code for storing and retrieving complex
          behaviors, and ... an iterative prompting mechanism that incorporates
          environment feedback, execution errors, and self-verification for
          program improvement."
        location: "arXiv API abstract for 2305.16291v2"
        confidence: medium
        limitations: "Minecraft supplies stable APIs and feedback unlike many CAK target environments."
      - id: claim_voyager_002
        claim: >-
          Voyager reports temporally extended, interpretable, compositional
          skills that transfer to a new Minecraft world.
        supporting_passage: >-
          "The skills developed by Voyager are temporally extended,
          interpretable, and compositional... Voyager is able to utilize the
          learned skill library in a new Minecraft world to solve novel tasks
          from scratch."
        location: "arXiv API abstract for 2305.16291v2"
        confidence: medium
        limitations: "Transfer is shown within Minecraft-style environments, not arbitrary agent runtimes."
      - id: claim_voyager_003
        claim: >-
          Voyager's full paper frames skills as executable code over control
          primitive APIs and admits them after environment feedback,
          interpreter errors, and self-verification.
        supporting_passage: >-
          "Inspired by the generality, interpretability, and universality of
          programs, we represent each skill with executable code... The input
          prompt... consists of... Control primitive APIs, and relevant skills
          retrieved from the skill library... The generated code from the last
          round, environment feedback, execution errors, and critique... During
          each round of code generation, we execute the generated program to
          obtain environment feedback and execution errors..."
        location: "Full paper Sections 2.2-2.3"
        confidence: high
        limitations: "Requires a code-as-action environment with available control primitive APIs."
      - id: claim_voyager_004
        claim: >-
          Voyager documents limits where self-verification may fail and code
          generation can hallucinate unavailable APIs or impossible tasks.
        supporting_passage: >-
          "Occasionally, self-verification module may also fail... The automatic
          curriculum occasionally proposes unachievable tasks... Hallucinations
          also occur during the code generation process... it may call functions
          absent in the provided control primitive APIs, leading to code
          execution errors."
        location: "Full paper Section 4, Limitations and Future Work"
        confidence: high
        limitations: "Supports limits of executable skill/self-verification approaches, not a general rejection."
    counterclaims:
      - "Executable code skills do not automatically solve activation, admission, permission, or supply-chain risk."
    extracted_patterns:
      - pattern_id: pattern_executable_external_skill_library
        pattern: "executable external skill library"
        what_to_copy: "Keep reusable behavior as external, interpretable artifacts."
        what_not_to_copy: "Do not assume environment APIs and feedback are stable."
        agent_native_adaptation: "Require trace evidence, permissions, verifier checks, and sandboxing before admission."
        risk: "Executable skills can encode brittle or unsafe actions."
      - pattern_id: pattern_self_verification
        pattern: "self-verification before skill admission"
        what_to_copy: "Use execution-grounded feedback before accepting a skill."
        what_not_to_copy: "Do not treat self-verification as independent proof."
        agent_native_adaptation: "Pair self-verification with replay, external verifiers, and review."
        risk: "Self-confirmation and sampled-test overfitting."
    notes: "Targeted full-paper inspection added for code-as-skill representation, feedback loop, and limitations."

  - id: src_agent_skills_spec
    title: "Agent Skills"
    url: "https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview.md"
    type: docs
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Portable package format baseline and official security guidance."
    reliability: high
    claims:
      - id: claim_agent_skills_001
        claim: >-
          Agent Skills are modular packages of instructions, metadata, and
          optional resources that Claude uses automatically when relevant.
        supporting_passage: >-
          "Agent Skills are modular capabilities that extend Claude's
          functionality. Each Skill packages instructions, metadata, and
          optional resources (scripts, templates) that Claude uses automatically
          when relevant."
        location: "Opening paragraph"
        confidence: high
        limitations: "Provider-specific product documentation, not a CAK standard."
      - id: claim_agent_skills_002
        claim: >-
          Agent Skills use progressive disclosure: metadata is always loaded,
          SKILL.md is loaded when triggered, and resources/code are loaded as
          needed.
        supporting_passage: >-
          "Skills can contain three types of content, each loaded at different
          times... Level 1: Metadata (always loaded)... Level 2: Instructions
          (loaded when triggered)... Level 3: Resources and code (loaded as
          needed)."
        location: "How Skills work / Three types of Skill content"
        confidence: high
        limitations: "Loading mechanics do not define runtime-control semantics."
      - id: claim_agent_skills_003
        claim: >-
          The docs warn that malicious Skills can misuse tools, execute code,
          exfiltrate data, or access systems; untrusted Skills should be audited
          like installed software.
        supporting_passage: >-
          "A malicious Skill can direct Claude to invoke tools or execute code
          in ways that don't match the Skill's stated purpose... malicious
          Skills could lead to data exfiltration, unauthorized system access, or
          other security risks... Treat like installing software."
        location: "Security considerations"
        confidence: high
        limitations: "Guidance is not a formal supply-chain or admission model."
      - id: claim_agent_skills_004
        claim: >-
          Runtime constraints differ across product surfaces; the same package
          concept can have different network and execution semantics.
        supporting_passage: >-
          "The exact runtime environment available to your skill depends on the
          product surface... Claude API: No network access... Claude Code: Full
          network access."
        location: "Limitations and constraints"
        confidence: high
        limitations: "Provider-specific surfaces, but useful as a warning against assuming package portability equals runtime portability."
    counterclaims:
      - "A package can distribute instructions/resources but does not by itself prove activation correctness or verifier admission."
    extracted_patterns:
      - pattern_id: pattern_portable_skill_package
        pattern: "portable SKILL.md package"
        what_to_copy: "Separate metadata, instructions, code, and resources."
        what_not_to_copy: "Do not mistake packaging for runtime admission."
        agent_native_adaptation: "Compile package contents into evidence-linked runtime candidates."
        risk: "Package import can smuggle prompt injection or unsafe code."
      - pattern_id: pattern_progressive_disclosure
        pattern: "progressive disclosure"
        what_to_copy: "Load only relevant skill material as needed."
        what_not_to_copy: "Do not rely on retrieval alone for state correctness."
        agent_native_adaptation: "Combine progressive loading with typed activation and verifier checks."
        risk: "Wrong resource loaded in the wrong state."
    notes: "Inspected official Markdown documentation."

  - id: src_vaso_arxiv
    title: "VASO: Formally Verifiable Self-Evolving Skills for Physical AI Agents"
    url: "https://arxiv.org/abs/2606.05395"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Contract/type-system adjacent anchor."
    reliability: medium
    claims:
      - id: claim_vaso_001
        claim: >-
          VASO argues that execution feedback, unit tests, reward, and LLM
          self-critique provide trace-level evidence but not temporal-safety
          guarantees under untested conditions.
        supporting_passage: >-
          "Existing skill-evolution loops refine skills through execution
          feedback, unit tests, environment reward, or LLM self-critique, but
          these signals provide only trace-level evidence: they show that a
          skill worked on sampled executions, not that skill-induced plans
          satisfy temporal safety contracts under untested conditions."
        location: "arXiv API abstract for 2606.05395v1"
        confidence: medium
        limitations: "Physical-agent formal verification may not transfer to all CAK settings."
      - id: claim_vaso_002
        claim: >-
          VASO represents each skill as a semantic contract with formal
          verifier-facing and planner-facing interfaces.
        supporting_passage: >-
          "In VASO, each skill is represented as a semantic contract with two
          coupled interfaces: a formal interface that aligns robot states,
          observations, and control commands with logical propositions for model
          checking, and a planner-facing interface that guides executable
          behavior generation."
        location: "arXiv API abstract for 2606.05395v1"
        confidence: medium
        limitations: "Grounding correctness and proposition coverage are not established for CAK."
      - id: claim_vaso_003
        claim: >-
          VASO uses model-checker filtering and counterexample traces to update
          reusable skill contracts while keeping foundation-model weights frozen.
        supporting_passage: >-
          "A model checker first filters logically inconsistent skill
          contracts... When verification fails, VASO translates the
          counterexample trace into a textual gradient that updates the reusable
          skill contract while keeping foundation-model weights frozen."
        location: "arXiv API abstract for 2606.05395v1"
        confidence: medium
        limitations: "Supports a verifier pattern, not a CAK ContractSpec decision."
      - id: claim_vaso_004
        claim: >-
          VASO explicitly shows that incorrect proposition grounding can produce
          false formal safety guarantees.
        supporting_passage: >-
          "When this assumption is violated, formal verification may produce
          false safety guarantees... This example highlights that the
          correctness of verification fundamentally depends on the fidelity of
          the proposition-aligned mapping; an incorrect abstraction of low-level
          robot dynamics may lead to spurious verification results despite
          formally correct reasoning over the symbolic model."
        location: "Full paper Section 5 / Appendix failure case on proposition-aligned labeling"
        confidence: high
        limitations: "Robotics grounding example; CAK must identify its own proposition/state grounding failures."
    counterclaims:
      - "Formal contracts depend on correct grounding; wrong propositions can make verification misleading."
    extracted_patterns:
      - pattern_id: pattern_semantic_contracts
        pattern: "semantic skill contracts"
        what_to_copy: "Expose verifier-facing obligations explicitly."
        what_not_to_copy: "Do not assume all skills can be fully formalized."
        agent_native_adaptation: "Treat ContractSpec as one verifier facet, not the whole skill."
        risk: "Over-formalization with weak grounding."
      - pattern_id: pattern_counterexample_revision
        pattern: "model-checker filtering and counterexample-driven contract revision"
        what_to_copy: "Use verifier counterexamples as artifact-improvement evidence."
        what_not_to_copy: "Do not auto-promote revisions from one counterexample."
        agent_native_adaptation: "Route revisions through quarantine, replay, and review."
        risk: "Narrow counterexamples can overfit skill changes."
    notes: "Targeted full-paper inspection added for semantic contract definition and grounding-failure limitation."

  - id: src_psn_arxiv
    title: "Evolving Programmatic Skill Networks"
    url: "https://arxiv.org/abs/2601.03509"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Executable symbolic skill network and lifecycle anchor."
    reliability: medium
    claims:
      - id: claim_psn_001
        claim: >-
          PSN frames skills as executable symbolic programs forming a
          compositional network that evolves through experience.
        supporting_passage: >-
          "We introduce the Programmatic Skill Network (PSN), a framework in
          which skills are executable symbolic programs forming a compositional
          network that evolves through experience."
        location: "arXiv API abstract for 2601.03509v1"
        confidence: medium
        limitations: "Abstract-level inspection; code availability and engineering details not confirmed."
      - id: claim_psn_002
        claim: >-
          PSN includes structured fault localization, maturity-aware update
          gating, and rollback validation.
        supporting_passage: >-
          "PSN defines three core mechanisms... REFLECT for structured fault
          localization over skill compositions, progressive optimization with
          maturity-aware update gating... and canonical structural refactoring
          under rollback validation."
        location: "arXiv API abstract for 2601.03509v1"
        confidence: medium
        limitations: "Symbolic-program assumptions may not fit ambiguous LLM-agent state."
      - id: claim_psn_003
        claim: >-
          PSN constrains updates by recent repair proposals, reduces update
          frequency for mature skills, and reverts structural refactors when
          short-horizon success drops.
        supporting_passage: >-
          "To stabilize learning, updates are constrained by a rolling buffer of
          the 5 most recent repair proposals, preventing contradictory edits...
          Mature skills stabilize with low update probability, while immature
          skills remain plastic... All refactor proposals are tentative... If
          the task success rate drops by more than 20%, the refactor is reverted
          using logged inverse operations."
        location: "Full paper Section 2, optimization/refactor mechanisms"
        confidence: medium
        limitations: "Thresholds and symbolic-program assumptions are PSN-specific."
      - id: claim_psn_004
        claim: >-
          PSN reports that without maturity stabilization, downstream failures
          repeatedly modify converged skills and cause oscillatory behavior.
        supporting_passage: >-
          "Without stabilization, converged skills are repeatedly modified by
          downstream failures, leading to oscillatory behavior. By contrast,
          maturity-aware gating progressively reduces the update frequency of
          reliable skills while allowing immature skills to remain plastic."
        location: "Full paper ablation discussion"
        confidence: medium
        limitations: "Supports lifecycle gating pressure, not a mandatory CAK SkillGraph."
    counterclaims:
      - "A lifecycle graph may be overengineering if skill counts remain small or runtime hooks remain passive."
    extracted_patterns:
      - pattern_id: pattern_skill_network_lifecycle
        pattern: "executable symbolic skill network with maturity-aware gating and rollback"
        what_to_copy: "Track dependency, maturity, fault localization, and rollback."
        what_not_to_copy: "Do not equate larger skill libraries with better behavior."
        agent_native_adaptation: "Represent admitted skill artifacts as lifecycle nodes with health and rollback metadata."
        risk: "Governance machinery can become process overhead."
    notes: "Targeted full-paper inspection added for maturity gating, rollback validation, and ablation limits."

  - id: src_hmt_arxiv
    title: "Enhancing Web Agents with a Hierarchical Memory Tree"
    url: "https://arxiv.org/abs/2603.07024"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Stage-aware procedural memory and workflow-brittleness anchor."
    reliability: medium
    claims:
      - id: claim_hmt_001
        claim: >-
          HMT identifies flat memory as a source of workflow mismatch because it
          entangles high-level task logic with site-specific action details.
        supporting_passage: >-
          "We identify that this challenge arises from the flat memory
          structures that entangle high-level task logic with site-specific
          action details. This entanglement induces a workflow mismatch in new
          environments."
        location: "arXiv API abstract for 2603.07024v1"
        confidence: medium
        limitations: "Web-agent setting may not transfer to all CAK tool environments."
      - id: claim_hmt_002
        claim: >-
          HMT separates intent, stage, and action levels, with stage-level
          observable preconditions/postconditions and stage-aware inference.
        supporting_passage: >-
          "The Stage level defines reusable semantic subgoals characterized by
          observable pre-conditions and post-conditions... By explicitly
          validating pre-conditions, the Planner aligns the current state with
          the correct logical subgoal to prevent workflow mismatch."
        location: "arXiv API abstract for 2603.07024v1"
        confidence: medium
        limitations: "Requires observable preconditions/postconditions."
      - id: claim_hmt_003
        claim: >-
          HMT reports that hierarchical structure and pre/postconditions reduce
          context pollution, while raw identifiers fail badly in cross-website
          generalization.
        supporting_passage: >-
          "Our method substantially outperforms 'w/ Flat Memory', which
          indicates that the hierarchical structure reduces context pollution...
          With the removal of pre/post-conditions, the performance drops by
          2.5% on WebArena... replacing semantic descriptions with raw
          identifiers... proves catastrophic for cross-website generalization...
          StepSR plummets from 39.7% to 12.4%."
        location: "Full paper ablation studies"
        confidence: medium
        limitations: "Web UI benchmark evidence; CAK must verify comparable state observability."
      - id: claim_hmt_004
        claim: >-
          HMT still has failure modes in ambiguous grounding and subtle state
          transitions.
        supporting_passage: >-
          "Despite these capabilities, the system exhibits limitations in
          scenarios involving Ambiguous Grounding or subtle state transitions...
          Ambiguous Grounding occurs when the retrieved semantic description
          lacks sufficient hierarchical context."
        location: "Full paper failure mode analysis"
        confidence: medium
        limitations: "Shows StageGraph-like memory is not sufficient by itself."
    counterclaims:
      - "Structured memory may still need domain-specific selectors and action grounding."
    extracted_patterns:
      - pattern_id: pattern_stage_aware_memory
        pattern: "stage-aware procedural memory"
        what_to_copy: "Separate intent, stage, and action; validate preconditions before reuse."
        what_not_to_copy: "Do not reuse flat traces as universal workflows."
        agent_native_adaptation: "Compile stage predicates into typed runtime activation checks where possible."
        risk: "Preconditions can be incomplete or unobservable."
    notes: "Targeted full-paper inspection added for hierarchy, ablations, and failure modes."

  - id: src_skillwiki_arxiv
    title: "SkillWiki: A Living Knowledge Infrastructure for Agent Skills"
    url: "https://arxiv.org/abs/2606.16523"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Skill lifecycle, provenance, and governance anchor."
    reliability: medium
    claims:
      - id: claim_skillwiki_001
        claim: >-
          SkillWiki frames agent skills as needing infrastructure for
          production, governance, evolution, grounding, and provenance-aware
          exploration.
        supporting_passage: >-
          "Agent skills still lack an infrastructure for large-scale
          production, governance, and evolution. SkillWiki is a living knowledge
          infrastructure that supports the organization, grounding, and
          continuous evolution of agent skills by transforming heterogeneous
          knowledge into reusable skill assets linked to their originating
          evidence."

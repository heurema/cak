research_run_id: rdr_001_agent_native_skill
status: exploratory
question: "What is an agent-native skill?"
owner: ""
date_started: "2026-06-23"

source_policy:
  claim_support: "Only inspected=true sources with explicit claims may support claim_matrix entries."
  seed_policy: "Seed references and uninspected leads may inform search only; they do not support claims."
  limitation: "Several inspected paper entries are abstract-level inspections and are not decision-grade evidence."

sources:
  - id: src_hasp_arxiv
    title: "Harnessing LLM Agents with Skill Programs"
    url: "https://arxiv.org/abs/2605.17734"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Core active-skill / Program Function anchor."
    reliability: medium
    claims:
      - id: claim_hasp_001
        claim: >-
          HASP frames textual lessons as advisory and introduces executable
          Program Functions that activate on failure-prone states and intervene
          in the agent loop.
        supporting_passage: >-
          "Such lessons are often encoded as textual guidance that remains
          largely advisory, lacking explicit mechanisms for when and how to
          intervene in the agent loop... PFs act as executable guardrails that
          activate on failure-prone states and modify the next action or inject
          corrective context."
        location: "arXiv API abstract for 2605.17734v1"
        confidence: medium
        limitations: "Abstract-level inspection; exact PF API and evaluation details still need full-paper review."
      - id: claim_hasp_002
        claim: >-
          HASP treats Program Functions as modular artifacts usable for
          inference-time intervention, post-training supervision, and controlled
          self-improvement through validated, teacher-reviewed PFs.
        supporting_passage: >-
          "HASP is highly modular: it can be applied at inference time for
          direct agent-loop intervention, during post-training to provide
          structured supervision, or for self-improvement by evolving validated,
          teacher-reviewed PFs."
        location: "arXiv API abstract for 2605.17734v1"
        confidence: medium
        limitations: "Teacher-review cost, validation quality, and false-positive intervention risk are not audited here."
    counterclaims:
      - "PFs may overblock or override valid behavior when activation precision is poor."
      - "HASP does not by itself prove that every skill should be an active runtime intervention."
    extracted_patterns:
      - pattern_id: pattern_program_function_intervention
        pattern: "Program Function should_activate / intervene"
        what_to_copy: "Separate activation decision from intervention action."
        what_not_to_copy: "Do not collapse all skills into hard runtime overrides."
        agent_native_adaptation: "Represent active skills as gated runtime-control objects with audit records."
        risk: "False-positive activation can suppress valid agent behavior."
      - pattern_id: pattern_structured_intervention
        pattern: "context injection and action override"
        what_to_copy: "Study both soft corrective context and hard next-action modification."
        what_not_to_copy: "Do not permit intervention without permission, risk, and rollback semantics."
        agent_native_adaptation: "Attach intervention mode to typed effect and verifier policy."
        risk: "Action override can become hidden authority widening."
    notes: "Inspected arXiv metadata/abstract. Full paper remains needed before decision-grade use."

  - id: src_awm_arxiv
    title: "Agent Workflow Memory"
    url: "https://arxiv.org/abs/2409.07429"
    type: paper
    primary: true
    inspected: true
    inspected_by: codex
    date_accessed: "2026-06-23"
    relevance: "Core workflow-memory anchor."
    reliability: medium
    claims:
      - id: claim_awm_001
        claim: >-
          AWM induces reusable workflows from past examples or test-time queries
          and selectively provides those workflows to guide future generations.
        supporting_passage: >-
          "We introduce Agent Workflow Memory (AWM), a method for inducing
          commonly reused routines, i.e., workflows, and selectively providing
          workflows to the agent to guide subsequent generations."
        location: "arXiv API abstract for 2409.07429v1"
        confidence: medium
        limitations: "Abstract-level inspection; exact workflow representation and failure cases require full-paper review."
      - id: claim_awm_002
        claim: >-
          AWM reports improved relative success on Mind2Web and WebArena and
          fewer steps on successful WebArena tasks.
        supporting_passage: >-
          "AWM substantially improves the baseline results by 24.6% and 51.1%
          relative success rate on Mind2Web and WebArena while reducing the
          number of steps taken to solve WebArena tasks successfully."
        location: "arXiv API abstract for 2409.07429v1"
        confidence: medium
        limitations: "Benchmark gains do not decide whether workflow memory should be passive, active, or compiled."
    counterclaims:
      - "AWM alone does not establish typed preconditions, runtime admission, or security semantics."
    extracted_patterns:
      - pattern_id: pattern_workflow_induction
        pattern: "workflow induction from trajectories"
        what_to_copy: "Mine repeated routines from trajectories."
        what_not_to_copy: "Do not assume a linear workflow is valid in every similar task."
        agent_native_adaptation: "Bind workflows to preconditions, postconditions, and repair exits."
        risk: "Wrong-state activation."
    notes: "Inspected arXiv metadata/abstract."

  - id: src_voyager_arxiv

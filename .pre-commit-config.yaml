repos:
  - repo: local
    hooks:
      - id: docs-check
        name: docs check
        entry: python3 scripts/check_docs.py
        language: system
        pass_filenames: false

      - id: python-ruff
        name: python ruff
        entry: python3 -m ruff check src tests scripts examples
        language: system
        pass_filenames: false

      - id: python-mypy
        name: python mypy
        entry: python3 -m mypy src --show-error-codes --pretty
        language: system
        pass_filenames: false

      - id: python-pytest
        name: python pytest
        entry: python3 -m pytest
        language: system
        pass_filenames: false

      - id: python-demo-smoke
        name: python demo smoke
        entry: env PYTHONPATH=src python3 examples/v0_1/demo.py
        language: system
        pass_filenames: false

      - id: rust-fmt
        name: rust fmt
        entry: cargo fmt --check
        language: system
        pass_filenames: false

      - id: rust-clippy
        name: rust clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false

      - id: rust-test
        name: rust test
        entry: cargo test --workspace
        language: system
        pass_filenames: false
